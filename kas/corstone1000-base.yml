header:
  version: 14

distro: poky

defaults:
  repos:
    branch: wrynose

repos:
  bitbake:
    url: https://git.openembedded.org/bitbake
    branch: "2.18"
    commit: 22021758e66737bcf68dfd2b74adc6a0cb1d42d9
    layers:
      bitbake: disabled

  core:
    url: https://git.openembedded.org/openembedded-core
    commit: 06dd66e6220e5ce4ed4b9af4d8231ae5f0a8ce80
    layers:
      meta:

  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    commit: 8251bdad5fda780a000fb41e6eda82eadf0fa39e
    layers:
      meta-poky:

  meta-arm:
    layers:
      meta-arm:
      meta-arm-bsp:
      meta-arm-toolchain:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    commit: 9af4488d46cb4fd4c0d2d64820c86225ebd6ac71
    layers:
      meta-oe:
      meta-python:
      meta-perl:

  meta-secure-core:
    url: https://github.com/wind-river/meta-secure-core.git
    commit: 07a99ae241acd488a2feda1ededf87dc70dfde80
    layers:
      meta-secure-core-common:
      meta-signing-key:
      meta-efi-secure-boot:

local_conf_header:
  base: |
    CONF_VERSION = "2"

  setup: |
    PACKAGE_CLASSES = "package_ipk"
    BB_NUMBER_THREADS ?= "16"
    PARALLEL_MAKE ?= "-j16"
    PACKAGECONFIG:append:pn-perf = " coresight"

machine: unset

target:
  - corstone1000-flash-firmware-image
