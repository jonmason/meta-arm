# Simple target to build the FVPs that are publically available

header:
  version: 14
  includes:
    - ci/base.yml

machine: qemuarm64

local_conf_header:
  license: |
    LICENSE_FLAGS_ACCEPTED += "Arm-FVP-EULA"
  sdk: |
    SDKMACHINE = "x86_64"

target:
  - nativesdk-fvp-base-a-aem
  - nativesdk-fvp-corstone300
  - nativesdk-fvp-corstone500
  - nativesdk-fvp-corstone700
  - nativesdk-fvp-corstone1000
  - nativesdk-fvp-e1-edge
  - nativesdk-fvp-morello
  - nativesdk-fvp-n1-edge
  - nativesdk-fvp-n2-automotive
  - nativesdk-fvp-neoverse-v1
  - nativesdk-fvp-neoverse-v2
  - nativesdk-fvp-sgi575
  - nativesdk-fvp-tc0
  - nativesdk-fvp-tc1
